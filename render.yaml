databases:
  - name: temperature-visit-logger-db
    plan: free

services:
  - type: web
    name: temperature-visit-logger
    runtime: node
    rootDir: logger
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8787
      - key: ALLOWED_ORIGINS
        value: https://debeerswang.github.io,https://debeerswang.github.io/temperature/
      - key: DATABASE_URL
        fromDatabase:
          name: temperature-visit-logger-db
          property: connectionString